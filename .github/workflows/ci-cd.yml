name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: client-hub-cloud-run
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "22"
  GCP_PROJECT_ID: growingmonk-495400
  GCP_REGION: asia-south1
  GCP_SERVICE_ACCOUNT: monkaudit-runner@growingmonk-495400.iam.gserviceaccount.com
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/678831951654/locations/global/workloadIdentityPools/github/providers/gm-sales-audit
  CLOUD_RUN_SERVICE: growingmonk-client-hub
  ARTIFACT_REGISTRY_REPO: growingmonk-hub
  IMAGE_NAME: growingmonk-client-hub

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run verify

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA}"
          docker build --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          region: ${{ env.GCP_REGION }}
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: ${{ env.IMAGE_URI }}
          flags: >-
            --service-account=${{ env.GCP_SERVICE_ACCOUNT }}
            --allow-unauthenticated
          env_vars_update_strategy: merge
          env_vars: |-
            APP_ENV=production
            AUTH_REQUIRED=true
            ALLOWLIST_EMAILS=${{ vars.ALLOWLIST_EMAILS }}
            DB_PROVIDER=firestore
            GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ env.GCP_REGION }}
            FIRESTORE_DATABASE_ID=client-hub
            NEXTAUTH_URL=https://hub.growingmonk.com
            GEMINI_PRO_MODEL=gemini-2.5-pro
            GEMINI_FLASH_MODEL=gemini-2.5-flash
            GEMINI_LITE_MODEL=gemini-2.5-flash-lite
            CLAUDE_SONNET_MODEL=claude-sonnet-4-6
            CLAUDE_HAIKU_MODEL=claude-haiku-4-5-20251001
            WHATSAPP_WEEKLY_REPORT_TEMPLATE=weekly_report
            WHATSAPP_REVIEW_REQUEST_TEMPLATE=review_request

      - name: Show service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
